name: CI

on:
  push:
    branches: [main, development]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...
      - name: static build
        run: CGO_ENABLED=0 go build -trimpath -ldflags='-s -w' -o dist/cassidy ./cmd/server
      - name: assert statically linked
        run: |
          file dist/cassidy
          file dist/cassidy | grep -q 'statically linked'

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: cassidy:ci
      - name: smoke test
        run: |
          docker run -d --name cassidy -p 8080:8080 cassidy:ci
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/healthz >/dev/null; then ok=1; break; fi
            sleep 1
          done
          [ "${ok:-0}" = "1" ] || { echo "healthz never came up"; docker logs cassidy; exit 1; }
          curl -fsS http://localhost:8080/healthz
          # First-run setup token should be present in the logs.
          docker logs cassidy 2>&1 | grep -q 'setup_token' || { echo "no setup token in logs"; exit 1; }
          docker rm -f cassidy
