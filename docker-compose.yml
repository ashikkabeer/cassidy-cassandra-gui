# Try Cassidy with a throwaway Cassandra in one command:
#   docker compose up --build
# Then open http://localhost:8080, grab the setup token from `docker compose
# logs cassidy`, claim the admin at /first-run, and add a connection with
# host `cassandra` port `9042` (no auth, no TLS).
services:
  cassandra:
    image: cassandra:5
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "SELECT release_version FROM system.local"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    volumes:
      - cassandra-data:/var/lib/cassandra

  cassidy:
    build: .
    depends_on:
      cassandra:
        condition: service_healthy
    ports:
      # Override the host port with CASSIDY_PORT if 8080 is taken: CASSIDY_PORT=8088 docker compose up
      - "${CASSIDY_PORT:-8080}:8080"
    environment:
      CASSIDY_LISTEN_ADDR: ":8080"
      CASSIDY_DATA_DIR: "/data"
    volumes:
      - cassidy-data:/data

volumes:
  cassidy-data:
  cassandra-data:
